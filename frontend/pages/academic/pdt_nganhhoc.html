<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ngành học - Phòng Đào Tạo</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
    
    <link rel="stylesheet" href="../../css/main.css">
    <link rel="stylesheet" href="../../css/layout.css">
    <link rel="stylesheet" href="../../css/button.css">
    <link rel="stylesheet" href="../../css/sidebar.css">
    <link rel="stylesheet" href="../../css/dashboard.css">
    <link rel="stylesheet" href="../../css/components.css">
    <link rel="stylesheet" href="../../css/pdt_nganhhoc.css">
</head>
<body class="dashboard-body">
    <div class="dashboard-layout">
        <aside class="sidebar-wrapper">
            <div class="sidebar-brand-box">
                <div class="brand-icon"><i class="ti ti-school"></i></div>
                <span class="brand-name">EduFee</span>
            </div>
            <div class="sidebar-user-profile">
                <div class="profile-avatar">B</div>
                <div class="profile-info">
                    <div class="profile-name">Nguyễn Văn B</div>
                    <div class="profile-role">Phòng Đào tạo</div>
                </div>
            </div>
            <nav class="sidebar-menu sidebar-scroll">
                <a href="pdt.html" class="menu-item">
                    <i class="ti ti-home"></i> Trang chủ
                </a>
                <a href="pdt_sv.html" class="menu-item">
                    <i class="ti ti-users"></i> Sinh viên
                </a>
                <a href="pdt_nganhhoc.html" class="menu-item active">
                    <i class="ti ti-building-community"></i> Ngành học
                </a>
                <a href="pdt_monhoc.html" class="menu-item">
                    <i class="ti ti-book"></i> Môn học
                </a>
                <a href="#" class="menu-item">
                    <i class="ti ti-clipboard-list"></i> Đăng ký học phần
                </a>
            </nav>
            <div class="sidebar-footer">
                <a href="#" class="menu-item"><i class="ti ti-lock"></i> Đổi mật khẩu</a>
                <a href="../../index.html" class="menu-item text-red"><i class="ti ti-logout"></i> Đăng xuất</a>
            </div>
        </aside>

        <div class="main-content-area">
            <main class="dashboard-main space-y-8">
                <div class="dashboard-card card-body">
                    <div class="filter-bar">
                        <div class="filter-inputs">
                            <input type="text" placeholder="Tìm kiếm mã ngành hoặc tên ngành" class="filter-input">
                            <select class="filter-select">
                                <option>Khoa quản lý</option>
                                <option>Khoa CNTT</option>
                            </select>
                        </div>
                        <div class="filter-actions">
                            <button class="btn btn-primary"><i class="ti ti-plus"></i> Thêm ngành học</button>
                            <button class="btn btn-outline"><i class="ti ti-refresh"></i> Làm mới</button>
                        </div>
                    </div>
                </div>

                <div class="dashboard-card">
                    <div class="card-header">
                        <h2 class="card-title">Danh sách Ngành học</h2>
                        <span class="card-count">35 ngành học</span>
                    </div>
                    <div class="table-wrapper">
                        <table>
                            <thead>
                                <tr>
                                    <th>Mã ngành</th>
                                    <th>Tên ngành</th>
                                    <th>Khoa quản lý</th>
                                    <th>Trạng thái</th>
                                    <th>Thao tác</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr>
                                    <td>CNTT</td>
                                    <td>Công nghệ Thông tin</td>
                                    <td>Khoa Công nghệ Thông tin</td>
                                    <td><span class="badge badge-green">Đang hoạt động</span></td>
                                    <td>
                                        <div class="action-btns">
                                            <button class="action-btn-icon"><i class="ti ti-eye"></i></button>
                                            <button class="action-btn-icon"><i class="ti ti-pencil"></i></button>
                                        </div>
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </main>
        </div>
    </div>
</body>
</html>
